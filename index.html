<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hira Kashta, LLC</title>
  <meta name="description" content="Hira Kashta, LLC — We make things.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --white: #fafafa;
      --gray-300: #a3a3a3;
      --gray-500: #737373;
      --black: #0a0a0a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--black);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .content {
      max-width: 480px;
      width: 100%;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
      animation: fadeUp 0.8s ease both;
    }

    .tagline {
      font-size: 1.125rem;
      color: var(--gray-300);
      margin-bottom: 3rem;
      animation: fadeUp 0.8s ease 0.1s both;
    }

    .contact {
      animation: fadeUp 0.8s ease 0.2s both;
    }

    .contact a {
      color: var(--gray-300);
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.2s;
    }

    .contact a:hover { color: var(--white); }

    .footer {
      position: fixed;
      bottom: 2rem;
      font-size: 0.75rem;
      color: var(--gray-500);
      animation: fadeUp 0.8s ease 0.3s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="content">
    <h1>Hira Kashta, LLC</h1>
    <p class="tagline">We make things.</p>
    <div class="contact">
      <a href="mailto:contact@hirakashta.com">contact@hirakashta.com</a>
    </div>
  </div>

  <div class="footer">&copy; 2026 Hira Kashta, LLC</div>

</body>
</html>
